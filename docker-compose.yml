# Kronos — 전체 스택 (Phase 2: PostgreSQL + collector + sentiment + dashboard)
#
#   docker compose up -d --build       # 빌드 + 백그라운드 기동
#   docker compose logs -f collector   # 수집 로그
#   docker compose logs -f sentiment   # 감성분석 로그
#   docker compose down                # 중지
#
# DB는 named volume(pgdata) — bind mount 위 SQLite 동시쓰기 손상 이슈를 근본 회피.
# 재부팅 자동 복원: Docker Desktop "Start when you sign in" 설정 필요.

x-app-env: &app-env
  # 컨테이너는 host=postgres로 접속 (.env의 localhost DATABASE_URL을 덮어씀)
  DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
  LOG_DIR: /app/logs
  TZ: Asia/Seoul

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      TZ: Asia/Seoul
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"  # 호스트 도구(마이그레이션·psql)용, localhost 전용
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  collector:
    build: .
    image: kronos:latest
    command: ["kronos", "run"]
    env_file: .env
    environment: *app-env
    volumes:
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  sentiment:
    build:
      context: .
      target: analysis
    image: kronos-analysis:latest
    command: ["kronos", "analyze", "run", "--interval", "300"]
    env_file: .env
    environment:
      <<: *app-env
      HF_HOME: /app/.hf_cache
    volumes:
      - ./logs:/app/logs
      - hf_cache:/app/.hf_cache
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  dashboard:
    image: kronos:latest
    command:
      - streamlit
      - run
      - /app/src/kronos/dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --browser.gatherUsageStats=false
    env_file: .env
    environment: *app-env
    volumes:
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8501:8501"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hf_cache:
  pgdata:
