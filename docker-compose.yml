# Kronos — 전체 스택 (Phase 2: SQLite + collector + sentiment + dashboard)
# Phase 2 후반에 postgres 서비스 추가 검토.
#
#   docker compose up -d --build       # 빌드 + 백그라운드 기동
#   docker compose logs -f collector   # 수집 로그
#   docker compose logs -f sentiment   # 감성분석 로그
#   docker compose down                # 중지
#
# 재부팅 자동 복원: Docker Desktop "Start when you sign in" 설정 필요.

services:
  collector:
    build: .
    image: kronos:latest
    command: ["kronos", "run"]
    env_file: .env
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    restart: unless-stopped

  sentiment:
    build:
      context: .
      target: analysis
    image: kronos-analysis:latest
    command: ["kronos", "analyze", "run", "--interval", "300"]
    env_file: .env
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
      HF_HOME: /app/.hf_cache
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - hf_cache:/app/.hf_cache
    restart: unless-stopped

  dashboard:
    image: kronos:latest
    # 이미 collector가 빌드한 이미지를 재사용
    depends_on:
      - collector
    # 컨테이너 내부는 0.0.0.0 바인딩해야 publish가 닿음.
    # 호스트에서는 127.0.0.1로만 publish → 외부 직접 노출 없음(Tailscale serve가 담당).
    command:
      - streamlit
      - run
      - /app/src/kronos/dashboard/app.py
      - --server.address=0.0.0.0
      - --server.port=8501
      - --server.headless=true
      - --browser.gatherUsageStats=false
    env_file: .env
    environment:
      DATA_DIR: /app/data
      LOG_DIR: /app/logs
      TZ: Asia/Seoul
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    ports:
      - "127.0.0.1:8501:8501"
    restart: unless-stopped

volumes:
  hf_cache:
